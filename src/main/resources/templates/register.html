<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Inscription</title>
  <link rel="stylesheet" href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h4>Inscription</h4>
        </div>
        <div class="card-body">
          <form id="registerForm">
            <div class="mb-3">
              <label>Email</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label>Mot de passe</label>
              <input type="password" id="password" class="form-control" required>
            </div>
            <div class="mb-3">
              <label>Confirmer</label>
              <input type="password" id="confirmPassword" class="form-control" required>
            </div>
            <div id="message" class="alert d-none"></div>
            <button type="button" class="btn btn-primary w-100" onclick="register()">S'inscrire</button>
          </form>
          <hr>
          <a href="/login">Déjà un compte ? Se connecter</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  async function register() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const msgDiv = document.getElementById('message');

      if (password !== confirm) {
          msgDiv.className = 'alert alert-danger';
          msgDiv.textContent = 'Les mots de passe ne correspondent pas';
          msgDiv.classList.remove('d-none');
          return;
      }

      try {
          const response = await fetch('/api/auth/register', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({email: email, password: password, role: 'user'})
          });
          const data = await response.json();
          if (response.ok) {
              msgDiv.className = 'alert alert-success';
              msgDiv.textContent = data.message;
              msgDiv.classList.remove('d-none');
              setTimeout(() => { window.location.href = '/login'; }, 3000);
          } else {
              msgDiv.className = 'alert alert-danger';
              msgDiv.textContent = data.error;
              msgDiv.classList.remove('d-none');
          }
      } catch (error) {
          msgDiv.className = 'alert alert-danger';
          msgDiv.textContent = 'Erreur de connexion';
          msgDiv.classList.remove('d-none');
      }
  }
</script>
<script src="/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
